{{ if .Params.math }}
<link rel="stylesheet" href="{{ "lib/katex/katex.min.css" | absURL }}">
<script defer src="{{ "lib/katex/katex.min.js" | absURL }}"></script>
<script defer src="{{ "lib/katex/contrib/auto-render.min.js" | absURL }}"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (typeof renderMathInElement === "undefined") return;
    renderMathInElement(document.body, {
        delimiters: [
            {left: "\\[", right: "\\]", display: true},
            {left: "\\(", right: "\\)", display: false}
        ],
        throwOnError: false
    });
});
</script>
{{ end }}
